name: whisper_env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - ffmpeg
  - pandas
  - matplotlib
  - numpy
  - scipy
  - pip
  - pip:
    - torch
    - torchaudio
    - transformers
    - soundfile
    - librosa
    - jiwer
    - accelerate
    - datasets
    - torchcodec
    - openai-whisper  
    - setuptools-rust
    - word2number
    - fire
    - sentencepiece
    - tqdm